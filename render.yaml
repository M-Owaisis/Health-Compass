services:
  # Node.js backend
  - type: web
    name: health-compass-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: ML_SERVICE_URL
        value: https://health-compass-ml.onrender.com

  # Python ML Service
  - type: web
    name: health-compass-ml
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:10000 ml_service:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0

  # React Frontend (Static Site - Always Free)
  - type: web
    name: health-compass-frontend
    env: static
    rootDir: frontend
    buildCommand: yarn install && CI=false yarn build
    staticPublishPath: frontend/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://health-compass-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
